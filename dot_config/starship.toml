format = "$username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh$fossil_branch$fossil_metrics${custom.git_main_clean}${custom.git_main_dirty}${custom.git_topic_clean}${custom.git_topic_dirty}$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$gcloud$openstack$azure$direnv$env_var$mise$crystal$sudo$cmd_duration$line_break$jobs$battery$time$status$container$netns$os$shell$character"

[aws]
disabled = true

[git_branch]
disabled = true

[custom.git_main_clean]
command = "git branch --show-current"
when = "branch=$(git branch --show-current 2>/dev/null) || exit 1; { [ \"$branch\" = main ] || [ \"$branch\" = master ]; } && [ -z \"$(git status --porcelain --ignore-submodules=dirty 2>/dev/null)\" ]"
format = "on [$symbol$output]($style) "
symbol = " "
style = "bold #d70000"

[custom.git_main_dirty]
command = "git branch --show-current"
when = "branch=$(git branch --show-current 2>/dev/null) || exit 1; { [ \"$branch\" = main ] || [ \"$branch\" = master ]; } && [ -n \"$(git status --porcelain --ignore-submodules=dirty 2>/dev/null)\" ]"
format = "on [$symbol$output]($style) "
symbol = " "
style = "bold #ff6b7a"

[custom.git_topic_clean]
command = "git branch --show-current"
when = "branch=$(git branch --show-current 2>/dev/null) || exit 1; [ -n \"$branch\" ] && [ \"$branch\" != main ] && [ \"$branch\" != master ] && [ -z \"$(git status --porcelain --ignore-submodules=dirty 2>/dev/null)\" ]"
format = "on [$symbol$output]($style) "
symbol = " "
style = "bold #5fd787"

[custom.git_topic_dirty]
command = "git branch --show-current"
when = "branch=$(git branch --show-current 2>/dev/null) || exit 1; [ -n \"$branch\" ] && [ \"$branch\" != main ] && [ \"$branch\" != master ] && [ -n \"$(git status --porcelain --ignore-submodules=dirty 2>/dev/null)\" ]"
format = "on [$symbol$output]($style) "
symbol = " "
style = "bold #ffaf00"
